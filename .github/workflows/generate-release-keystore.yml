name: Generate release keystore (run ONCE)

# Запусти этот workflow вручную ОДИН РАЗ через вкладку Actions → Run workflow.
# Он создаст release.keystore и положит base64 + пароли в Job summary.
# Скопируй из summary 3 строки в Settings → Secrets and variables → Actions:
#   RELEASE_KEYSTORE_B64
#   RELEASE_STORE_PASSWORD
#   RELEASE_KEY_PASSWORD
# Затем УДАЛИ этот workflow-файл!

on:
  workflow_dispatch:

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Generate keystore
        run: |
          STORE_PASS=$(openssl rand -base64 24 | tr -dc 'A-Za-z0-9' | head -c 24)
          KEY_PASS=$STORE_PASS
          keytool -genkeypair -v \
            -keystore release.keystore -storepass "$STORE_PASS" -keypass "$KEY_PASS" \
            -alias upload -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=ScamGuard,O=Personal,C=MD"
          KS_B64=$(base64 -w0 release.keystore)
          {
            echo "## Скопируй эти 3 значения в GitHub Secrets:"
            echo ""
            echo "### RELEASE_KEYSTORE_B64"
            echo "\`\`\`"
            echo "$KS_B64"
            echo "\`\`\`"
            echo "### RELEASE_STORE_PASSWORD"
            echo "\`\`\`"
            echo "$STORE_PASS"
            echo "\`\`\`"
            echo "### RELEASE_KEY_PASSWORD"
            echo "\`\`\`"
            echo "$KEY_PASS"
            echo "\`\`\`"
            echo ""
            echo "⚠️ ТАКЖЕ скачай файл release.keystore из artifacts и сохрани в надёжное место."
            echo "Если потеряешь — не сможешь выпускать обновления!"
          } >> $GITHUB_STEP_SUMMARY
      - uses: actions/upload-artifact@v4
        with:
          name: release-keystore-backup
          path: release.keystore
          retention-days: 1
