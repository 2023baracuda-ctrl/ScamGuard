name: Build APK

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEBUG_KEYSTORE_PATH: ${{ github.workspace }}/debug.keystore
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper (if missing)
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 9.3.1
          fi
          chmod +x ./gradlew

      - name: Generate debug.keystore
        run: |
          keytool -genkeypair -v \
            -keystore "$DEBUG_KEYSTORE_PATH" \
            -storepass android -keypass android \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"
          echo "--- created: ---"; ls -la "$DEBUG_KEYSTORE_PATH"

      - name: Create dummy .env (AI Studio's secrets plugin needs it)
        run: |
          [ -f .env ] || touch .env

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: scamguard-debug-apk
          path: app/build/outputs/apk/debug/*.apk
