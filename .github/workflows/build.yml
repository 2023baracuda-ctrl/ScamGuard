name: Build APK + AAB + Lint

on:
  push:
    branches: [ main, master ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      DEBUG_KEYSTORE_PATH: ${{ github.workspace }}/debug.keystore
      RELEASE_KEYSTORE_PATH: ${{ github.workspace }}/release.keystore
      STORE_PASSWORD: ${{ secrets.RELEASE_STORE_PASSWORD }}
      KEY_PASSWORD: ${{ secrets.RELEASE_KEY_PASSWORD }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Set up Android SDK
        uses: android-actions/setup-android@v3

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4

      - name: Generate Gradle wrapper (if missing)
        run: |
          if [ ! -f gradlew ]; then
            gradle wrapper --gradle-version 9.3.1
          fi
          chmod +x ./gradlew

      - name: Generate debug.keystore
        run: |
          keytool -genkeypair -v \
            -keystore "$DEBUG_KEYSTORE_PATH" \
            -storepass android -keypass android \
            -alias androiddebugkey \
            -keyalg RSA -keysize 2048 -validity 10000 \
            -dname "CN=Android Debug,O=Android,C=US"

      - name: Restore release keystore (if secrets present)
        if: ${{ env.STORE_PASSWORD != '' }}
        run: |
          echo "${{ secrets.RELEASE_KEYSTORE_B64 }}" | base64 -d > "$RELEASE_KEYSTORE_PATH"
          echo "KEYSTORE_PATH=$RELEASE_KEYSTORE_PATH" >> $GITHUB_ENV

      - name: Create dummy .env
        run: '[ -f .env ] || touch .env'

      - name: Android Lint (non-blocking)
        run: ./gradlew lint --continue || true

      - name: Upload Lint report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: lint-report
          path: app/build/reports/lint-results-*.html

      - name: Detekt (non-blocking)
        run: ./gradlew detekt --continue || true

      - name: Upload Detekt report
        uses: actions/upload-artifact@v4
        if: always()
        with:
          name: detekt-report
          path: app/build/reports/detekt/detekt.html

      - name: Build debug APK
        run: ./gradlew assembleDebug --stacktrace

      - name: Build release APK (if signing configured)
        if: ${{ env.STORE_PASSWORD != '' }}
        run: ./gradlew assembleRelease --stacktrace

      - name: Build release AAB (for Play Store)
        if: ${{ env.STORE_PASSWORD != '' }}
        run: ./gradlew bundleRelease --stacktrace

      - name: Upload debug APK
        uses: actions/upload-artifact@v4
        with:
          name: scamguard-debug
          path: app/build/outputs/apk/debug/*.apk

      - name: Upload release APK
        if: ${{ env.STORE_PASSWORD != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: scamguard-release
          path: app/build/outputs/apk/release/*.apk

      - name: Upload release AAB
        if: ${{ env.STORE_PASSWORD != '' }}
        uses: actions/upload-artifact@v4
        with:
          name: scamguard-release-aab
          path: app/build/outputs/bundle/release/*.aab
